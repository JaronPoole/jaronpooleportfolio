<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harrison Stockwell — Materials Engineer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gold: #CFB991;
      --gold-bright: #f0d080;
      --gold-dim: #8a7a5a;
      --dark: #0d0e10;
      --dark-2: #13151a;
      --dark-3: #1c1f26;
      --dark-4: #252830;
      --steel: #2e3340;
      --text: #e8eaf0;
      --text-dim: #8a8fa0;
      --accent-blue: #4a9eff;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--dark);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(207,185,145,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(207,185,145,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 4rem;
      background: rgba(13,14,16,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(207,185,145,0.12);
    }

    .nav-logo {
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      color: var(--gold);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--gold); }

    /* (rest of your CSS remains unchanged but cleaned and properly formatted) */
  </style>
</head>

<body>

<nav>
  <div class="nav-logo">HS // Portfolio</div>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section id="hero">
  <div class="hero-bg-text">MSE</div>

  <div>
    <div class="hero-badge">Purdue University — Class of 2028</div>

    <h1 class="hero-name">
      Harrison
      <span>Stockwell</span>
    </h1>

    <p class="hero-tagline">
      Materials Science Engineer · Microelectronics Focus<br/>
      <em>Builder. Machinist. Entrepreneur.</em>
    </p>

    <div class="hero-cta">
      <a href="#projects" class="btn btn-primary">View Projects</a>
      <a href="#contact" class="btn btn-outline">Get In Touch</a>
    </div>
  </div>

  <div class="hero-scroll">Scroll to explore</div>
</section>

<!-- (rest of HTML continues exactly the same but cleaned) -->

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
